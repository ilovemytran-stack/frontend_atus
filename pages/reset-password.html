<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt lại mật khẩu – Public</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Public">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="/css/global.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 16px; }
.auth-box { width: 100%; max-width: 400px; animation: fadeIn 0.4s ease; }
.auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 24px; text-align: center; }
.icon-big { font-size: 48px; margin-bottom: 12px; }
.auth-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.auth-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; }
.form { display: flex; flex-direction: column; gap: 14px; text-align: left; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-card">
    <div class="icon-big">🔑</div>
    <div class="auth-title">Đặt lại mật khẩu</div>
    <div class="auth-desc">Tạo mật khẩu mới cho tài khoản của bạn</div>
    <div class="form">
      <div class="input-group">
        <label class="input-label">Mật khẩu mới</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="input has-icon" id="password" type="password" placeholder="Ít nhất 6 ký tự">
          <button class="input-toggle" onclick="this.previousElementSibling.type = this.previousElementSibling.type==='password'?'text':'password'">👁</button>
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="input has-icon" id="confirmPassword" type="password" placeholder="Nhập lại">
        </div>
      </div>
      <button class="btn btn-primary" id="resetBtn" style="width:100%;padding:13px" onclick="reset()">Đặt lại mật khẩu</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { Toast.error('Link không hợp lệ'); setTimeout(() => location.href = 'login.html', 2000); }

async function reset() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('resetBtn');
  if (!password || password.length < 6) return Toast.error('Mật khẩu phải có ít nhất 6 ký tự');
  if (password !== confirm) return Toast.error('Mật khẩu không khớp');

  loadingBtn(btn, true);
  const res = await API.post(`/auth/reset-password/${token}`, { password });
  loadingBtn(btn, false);

  if (res?.success) {
    API.setToken(res.token);
    API.saveUser(res.user);
    Toast.success('Đặt lại mật khẩu thành công!');
    setTimeout(() => location.href = 'index.html', 1000);
  } else {
    Toast.error(res?.message || 'Link đã hết hạn, vui lòng thử lại');
  }
}
</script>
</body>
</html>
