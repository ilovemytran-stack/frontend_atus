<!DOCTYPE html>
<html lang="en" data-theme="cyan">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#060a10" />
<meta name="color-scheme" content="dark" />
<meta name="description" content="PUBLIC — system welcome screen" />
<title>PUBLIC // System Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Departure+Mono&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   PUBLIC — System Access
   A welcome/boot screen inspired by edex-ui's terminal-HUD identity.

   Design notes:
   - Palette: cold near-black (#060a10) + edex-ui's signature teal
     (#0abdc6), with an amber alt mode (vintage phosphor-terminal
     convention). Status green (#3cff8b) is functional, not decorative.
   - Type: Departure Mono (pixel/ROM character) for the one hero
     moment only; IBM Plex Mono for everything else. No sans-serif —
     it's a terminal, so it stays monospace end to end.
   - Signature: the on-screen keyboard that lights up with real
     keystrokes — edex-ui's most distinctive, unmistakable feature.
   - Motion is orchestrated, not ambient: the boot sequence plays
     once, the logo power-flickers once on reveal, everything else
     (grid, scanlines) stays quiet in the background.

   Rebrand: edit CONFIG near the top of the <script> at the bottom.
   ============================================================ */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

:root {
  --bg: #060a10;
  --border: rgba(255, 255, 255, 0.08);
  --text: #d7fbff;
  --text-dim: rgba(215, 251, 255, 0.5);
  --ok: #3cff8b;
}
html[data-theme="cyan"]  { --glow: #0abdc6; --glow-soft: rgba(10, 189, 198, 0.35); }
html[data-theme="amber"] { --glow: #ffb400; --glow-soft: rgba(255, 180, 0, 0.35); }

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', 'Courier New', monospace;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
  background-size: 48px 48px;
  z-index: 0;
  pointer-events: none;
}

.floor-grid {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 45vh;
  background-image:
    linear-gradient(var(--glow) 1px, transparent 1px),
    linear-gradient(90deg, var(--glow) 1px, transparent 1px);
  background-size: 44px 44px;
  transform: perspective(220px) rotateX(78deg);
  transform-origin: bottom;
  opacity: 0.12;
  z-index: 1;
  pointer-events: none;
  animation: gridMove 2.4s linear infinite;
}
@keyframes gridMove {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 44px, 0 44px; }
}

.matrix-rain {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: block;
  pointer-events: none;
}

.crt {
  position: fixed;
  inset: 0;
  z-index: 998;
  pointer-events: none;
  background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.06) 3px);
  animation: flicker 6s infinite;
}
@keyframes flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.85; }
  94% { opacity: 1; }
}

.boot-gate {
  position: fixed; inset: 0; z-index: 3000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: opacity 0.35s ease;
}
.boot-gate.gate-hide { opacity: 0; pointer-events: none; }
.boot-gate-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: rgba(255, 255, 255, 0.7);
}

.dragon-intro {
  position: fixed;
  inset: 0;
  z-index: 1500;
  background: var(--bg);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.85s ease;
}
.dragon-intro.dragon-visible { opacity: 1; }
.dragon-intro canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.dragon-flash {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.95), rgba(255,255,255,0) 62%);
  opacity: 0;
  mix-blend-mode: screen;
  transition: opacity 0.18s ease;
}
.dragon-flash.flash-active { opacity: 0.9; }

.dragon-caption {
  position: absolute;
  left: 50%;
  bottom: 8vh;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 2;
}
.dragon-caption.dc-visible { opacity: 1; }
.dc-frame {
  position: relative;
  border: 1.5px solid rgba(255, 255, 255, 0.85);
  background: rgba(6, 10, 16, 0.6);
  backdrop-filter: blur(3px);
}
.dc-corner { position: absolute; width: 14px; height: 14px; border: 1.5px solid #fff; opacity: 0.9; }
.dc-corner-tl { top: -1.5px; left: -1.5px; border-right: none; border-bottom: none; }
.dc-corner-tr { top: -1.5px; right: -1.5px; border-left: none; border-bottom: none; }
.dc-corner-bl { bottom: -1.5px; left: -1.5px; border-right: none; border-top: none; }
.dc-corner-br { bottom: -1.5px; right: -1.5px; border-left: none; border-top: none; }
.dc-header {
  padding: 9px 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.03em;
  color: rgba(255, 255, 255, 0.65);
  border-bottom: 1.5px solid rgba(255, 255, 255, 0.85);
}
.dc-body {
  padding: 20px 20px 26px;
  font-family: 'Baloo 2', 'IBM Plex Mono', sans-serif;
  font-weight: 600;
  font-size: clamp(14px, 4vw, 23px);
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
}

.boot-screen {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg);
  color: var(--glow);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 10vh 8vw;
  cursor: pointer;
}
.boot-log { font-size: 14px; line-height: 1.7; text-shadow: 0 0 6px var(--glow-soft); }
.boot-log .ok { color: var(--ok); text-shadow: 0 0 6px var(--ok); }
.cursor-blink { animation: blink 1s step-start infinite; }
@keyframes blink { 50% { opacity: 0; } }
.boot-bar { width: min(360px, 40vw); height: 3px; background: rgba(255,255,255,0.1); margin-top: 28px; }
.boot-bar-fill { height: 100%; width: 0%; background: var(--glow); box-shadow: 0 0 8px var(--glow); transition: width 0.2s ease; }
.boot-screen.boot-hide { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }

.app {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 240px 1fr 240px;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "topbar topbar topbar"
    "left hero right"
    "keyboard keyboard keyboard";
  height: 100vh;
  padding: 20px 28px 16px;
  gap: 18px;
  opacity: 0;
  transition: opacity 0.9s ease;
}
.app.hidden { display: none; transition: none; }
.app.app-visible { opacity: 1; }
.app.app-exit { animation: exitFlash 0.7s ease forwards; }
@keyframes exitFlash {
  0% { filter: brightness(1); opacity: 1; transform: scale(1); }
  35% { filter: brightness(2.6); }
  100% { filter: brightness(2.6); opacity: 0; transform: scale(1.04); }
}

/* Cross-cut exit transition: splits the screen into a top and bottom
   half. The top half flies up and off, the bottom half sinks down and
   off, revealing whatever comes next. Fires once, right before the
   handoff to another screen. */
.cross-cut-wrap {
  position: fixed;
  inset: 0;
  z-index: 3000;
  pointer-events: none;
}
.cross-cut-half {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: var(--bg);
  transform: translateY(0);
  opacity: 1;
  transition: transform 12s cubic-bezier(0.7, 0, 0.85, 1), opacity 12s ease-in;
}
.cross-cut-half > .cross-cut-inner {
  position: absolute;
  inset: 0;
}
.cross-cut-top { clip-path: inset(0 0 50% 0); }
.cross-cut-bottom { clip-path: inset(50% 0 0 0); }
.cross-cut-fly-up { transform: translateY(-120%); opacity: 0; }
.cross-cut-fly-down { transform: translateY(120%); opacity: 0; }
.cross-cut-seam {
  position: fixed;
  left: 0; right: 0; top: 50%;
  height: 2px;
  margin-top: -1px;
  background: var(--glow);
  box-shadow: 0 0 14px 3px var(--glow), 0 0 34px 6px var(--glow-soft);
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 3001;
  pointer-events: none;
}
.cross-cut-seam.cross-cut-seam-visible { opacity: 1; }

.corner { position: fixed; width: 34px; height: 34px; border: 2px solid var(--glow); opacity: 0.75; z-index: 3; pointer-events: none; }
.corner-tl { top: 14px; left: 14px; border-right: none; border-bottom: none; }
.corner-tr { top: 14px; right: 14px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 14px; left: 14px; border-right: none; border-top: none; }
.corner-br { bottom: 14px; right: 14px; border-left: none; border-top: none; }

.topbar {
  grid-area: topbar;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  letter-spacing: 0.08em;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.topbar-left, .topbar-right { display: flex; align-items: center; gap: 14px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
.dot-live { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
.clock { font-size: 14px; letter-spacing: 0.15em; color: var(--glow); text-shadow: 0 0 8px var(--glow-soft); }
.chip {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.chip:hover { border-color: var(--glow); color: var(--glow); }
.theme-picker { display: flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.08em; }
.theme-opt { background: none; border: none; color: var(--text-dim); font-family: inherit; font-size: inherit; letter-spacing: inherit; cursor: pointer; padding: 2px 4px; }
.theme-opt.active { color: var(--glow); text-shadow: 0 0 6px var(--glow-soft); }
.theme-sep { opacity: 0.3; }
.chip:focus-visible, .theme-opt:focus-visible, .enter-btn:focus-visible { outline: 2px solid var(--glow); outline-offset: 3px; }

.panel { border: 1px solid var(--border); border-radius: 4px; padding: 16px; font-size: 12px; background: rgba(255,255,255,0.015); }
.panel-left { grid-area: left; }
.panel-right { grid-area: right; display: flex; flex-direction: column; }
.panel h3 { font-weight: 600; font-size: 11px; letter-spacing: 0.18em; color: var(--glow); margin: 0 0 14px; opacity: 0.9; }
.stat { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.stat span:first-child { width: 30px; color: var(--text-dim); }
.stat span:last-child { width: 34px; text-align: right; color: var(--text-dim); }
.bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
.bar-fill { height: 100%; width: 0%; background: var(--glow); box-shadow: 0 0 6px var(--glow); transition: width 1s ease; }
.uptime { font-size: 18px; color: var(--glow); text-shadow: 0 0 8px var(--glow-soft); }
.log-feed { list-style: none; margin: 0; padding: 0; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 7px; }
.log-feed li { border-left: 2px solid var(--glow-soft); padding-left: 8px; opacity: 0.8; font-size: 11px; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 0.8; transform: translateY(0); } }

.hero { grid-area: hero; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; text-align: center; }
.logo {
  margin: 0;
  font-family: 'Departure Mono', 'IBM Plex Mono', monospace;
  font-size: clamp(2.2rem, 9vw, 5.5rem);
  letter-spacing: 0.1em;
  color: var(--text);
  text-shadow: 0 0 10px var(--glow-soft), 0 0 32px var(--glow-soft);
  animation: powerOn 1.1s ease-out 0.15s both;
}
@keyframes powerOn {
  0% { opacity: 0; filter: brightness(3); }
  8% { opacity: 1; filter: brightness(4); }
  10% { opacity: 0.2; filter: brightness(1); }
  14% { opacity: 1; }
  17% { opacity: 0.3; }
  22% { opacity: 1; filter: brightness(2); }
  100% { opacity: 1; filter: brightness(1); }
}

.logo-wrap { position: relative; display: inline-block; }
.logo-half {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  margin: 0;
  opacity: 0;
  animation: none;
  transform: translate(0, 0) rotate(0deg);
  transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
  pointer-events: none;
}
.logo-half-a { clip-path: polygon(0 0, 100% 0, 0 100%); }
.logo-half-b { clip-path: polygon(100% 0, 100% 100%, 0 100%); }
.split-active .logo-half { opacity: 1; }
.split-active .logo-half-a { transform: translate(-16%, -14%) rotate(-4deg); }
.split-active .logo-half-b { transform: translate(16%, 14%) rotate(4deg); }

@keyframes logoGlitch {
  0% { opacity: 1; filter: brightness(1); transform: translate(0, 0); }
  20% { opacity: 0.25; filter: brightness(3); transform: translate(-3px, 2px); }
  45% { opacity: 1; filter: brightness(1.6); transform: translate(3px, -2px); }
  70% { opacity: 0.3; filter: brightness(2); transform: translate(-2px, 0); }
  100% { opacity: 1; filter: brightness(1); transform: translate(0, 0); }
}
.logo-glitch { animation: logoGlitch 0.26s steps(3, end); }

.logo-globe {
  position: absolute;
  top: 50%; left: 50%;
  width: 25vw;
  height: 25vw;
  max-width: 130px;
  max-height: 130px;
  min-width: 70px;
  min-height: 70px;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 2;
  mix-blend-mode: screen;
}
.logo-globe.globe-visible { opacity: 1; }

/* ---- Location globe: spins, then homes in on the user's live GPS position ---- */
.geo-globe-wrap {
  position: relative;
  width: min(72vw, 260px);
  aspect-ratio: 1 / 1;
  margin: 0 auto;
}
.geo-globe { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.geo-marker {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  opacity: 0;
  transition: opacity 0.35s ease;
  pointer-events: none;
  z-index: 4;
}
.geo-marker.marker-visible { opacity: 1; }
.geo-marker::before {
  /* the pin body: a rotated rounded square whose one sharp corner forms the
     tip. transform-origin is pinned to that exact corner, which sits at the
     marker's (0,0) anchor, so the tip never drifts no matter the rotation. */
  content: '';
  position: absolute;
  left: 0; top: -22px;
  width: 22px; height: 22px;
  border-radius: 50% 50% 50% 0;
  transform-origin: 0% 100%;
  transform: rotate(-45deg);
  background:
    radial-gradient(circle at 50% 50%, #0a0e13 0 30%, transparent 31%),
    radial-gradient(circle at 32% 26%, #ff8072, #e21b1b 55%, #921010 100%);
  box-shadow: 0 0 10px 3px rgba(226, 27, 27, 0.75), 0 3px 6px rgba(0, 0, 0, 0.55);
}
.geo-marker::after {
  content: '';
  position: absolute;
  left: -7px; top: -7px;
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid #e21b1b;
  opacity: 0.7;
  animation: geoPulse 1.8s ease-out infinite;
}
@keyframes geoPulse {
  0% { transform: scale(0.35); opacity: 0.8; }
  100% { transform: scale(2.8); opacity: 0; }
}
.geo-label {
  position: absolute;
  top: 0; left: 0;
  transform: translate(16px, -95%);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--glow);
  text-shadow: 0 0 8px var(--glow-soft);
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 4;
}
.geo-label.label-visible { opacity: 1; }
.geo-status {
  margin: 6px 0 0;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-align: center;
  color: var(--glow);
  opacity: 0.6;
  min-height: 13px;
}

.tagline { margin: 0; font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--glow); opacity: 0.85; }
.enter-btn {
  font-family: inherit;
  font-weight: 600;
  background: transparent;
  border: 1px solid var(--glow);
  color: var(--text);
  padding: 15px 34px;
  font-size: 14px;
  letter-spacing: 0.22em;
  cursor: pointer;
  transition: 0.2s ease;
}
.enter-btn:hover { background: var(--glow-soft); box-shadow: 0 0 26px var(--glow-soft); transform: translateY(-2px); }
.enter-btn .bracket { opacity: 0.5; margin: 0 8px; }
.hint { margin: 0; font-size: 11px; color: var(--text-dim); }
kbd { border: 1px solid var(--border); border-radius: 3px; padding: 1px 6px; font-family: inherit; }

.keyboard { grid-area: keyboard; display: flex; flex-direction: column; align-items: center; gap: 4px; opacity: 0.85; }
.kb-row { display: flex; gap: 4px; }
.kb-key {
  min-width: 30px;
  height: 30px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 3px;
  font-size: 11px;
  color: var(--text-dim);
  background: rgba(255,255,255,0.02);
  transition: 0.05s ease;
}
.kb-key.active { background: var(--glow); color: var(--bg); box-shadow: 0 0 12px var(--glow); transform: translateY(1px); border-color: var(--glow); }
.kb-wide { min-width: 52px; }
.kb-space { min-width: 220px; }

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas: "topbar" "hero";
    padding: 16px;
  }
  .panel-left, .panel-right, .keyboard { display: none; }
  html, body { overflow-y: auto; }
  .boot-screen { padding: 8vh 7vw; }
  .boot-log { font-size: 12px; }
  .dragon-caption { bottom: 6vh; }
  .dc-header { padding: 8px 12px; }
  .dc-body { padding: 16px 12px 20px; }
}
</style>
</head>
<body>
<!--
  PUBLIC — System Access
  Welcome/boot screen inspired by edex-ui's terminal-HUD identity.
  Design notes live in the CSS comment above.
  Rebrand: edit CONFIG near the top of the <script> below.
-->
<div class="boot-gate" id="bootGate">
  <div class="boot-gate-text">TAP TO INITIALIZE<span class="cursor-blink">_</span></div>
</div>
<div class="crt"></div>
<div class="floor-grid"></div>
<canvas class="matrix-rain" id="matrixRain" aria-hidden="true"></canvas>
<div class="dragon-intro" id="dragonIntro">
  <canvas id="dragonCanvas"></canvas>
  <div class="dragon-flash" id="dragonFlash"></div>
  <div class="dragon-caption" id="dragonCaption" aria-hidden="true">
    <div class="dc-frame">
      <div class="dc-corner dc-corner-tl"></div>
      <div class="dc-corner dc-corner-tr"></div>
      <div class="dc-corner dc-corner-bl"></div>
      <div class="dc-corner dc-corner-br"></div>
      <div class="dc-header">Terminal command</div>
      <div class="dc-body"><span id="dcText"></span><span class="cursor-blink">_</span></div>
    </div>
  </div>
</div>

<div class="boot-screen" id="bootScreen">
  <div class="boot-log" id="bootLog"></div>
  <div class="boot-bar"><div class="boot-bar-fill" id="bootBarFill"></div></div>
</div>

<main class="app hidden" id="app">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <header class="topbar">
    <div class="topbar-left">
      <span><span class="dot dot-live"></span>SYSTEM ONLINE</span>
      <span class="clock" id="clock">00:00:00</span>
    </div>
    <div class="topbar-right">
      <button class="chip" id="soundToggle" type="button" aria-pressed="false">SOUND: OFF</button>
      <div class="theme-picker" id="themePicker">
        <button class="theme-opt active" type="button" data-theme="cyan">CYAN</button>
        <span class="theme-sep">/</span>
        <button class="theme-opt" type="button" data-theme="amber">AMBER</button>
      </div>
    </div>
  </header>

  <aside class="panel panel-left">
    <h3>SYSTEM</h3>
    <div class="stat"><span>CPU</span><div class="bar"><div class="bar-fill" id="cpuBar"></div></div><span id="cpuVal">0%</span></div>
    <div class="stat"><span>MEM</span><div class="bar"><div class="bar-fill" id="memBar"></div></div><span id="memVal">0%</span></div>
    <div class="stat"><span>NET</span><div class="bar"><div class="bar-fill" id="netBar"></div></div><span id="netVal">0%</span></div>
    <h3 style="margin-top:22px;">UPTIME</h3>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function () {
  'use strict';

  var CONFIG = {
    brand: 'PUBLIC',
    tagline: 'SOCIAL NETWORK · GAME NODE',
    enterLabel: 'ENTER SYSTEM',
    // login.html tự chuyển tiếp sang index.html nếu đã đăng nhập (xem API.isLoggedIn()
    // trong login.html), nên chỉ cần trỏ về đây là đủ cho cả 2 trường hợp.
    enterHref: 'login.html',
    dragonModelPath: 'Dragon.glb', // "Animated Dragon Three Motion Loops" by LasquetiSpice (CC-BY) — ship this file next to welcome.html on your host
    dragonOrbitDuration: 5000, // ms the dragon spends looping around the screen before starting to land
    dragonLandingDuration: 1500, // ms for the smooth glide-down from orbit into the resting/roar position
    dragonRoarAt: 7100, // ms after the intro starts when the roar SFX + camera hit fires
    dragonDecayDelay: 1100, // ms after the roar before the dragon starts dissolving into particles
    dragonDecayDuration: 1650, // ms the particle-dissolve effect itself takes
    dragonCaptionLines: [ // typed one at a time, in order, inside the terminal box that appears as the dragon dissolves
      'Welcome, wishing you a good day',
      'Welcome, web is designed by Tu'
    ],
    dragonCaptionTypeSpeed: 45, // ms per character while a line is being typed
    dragonCaptionDeleteSpeed: 22, // ms per character while a line is being deleted (backspace is faster than typing)
    dragonCaptionHoldMs: 1300, // ms a fully-typed line pauses before it gets deleted (or, on the last line, before it simply stays)
    crossCutDuration: 1400, // ms — screen-split exit transition (top half flies up, bottom half sinks down) played right before handoff to another screen
    bootLines: [
      'PUBLIC.OS KERNEL v3.2.0 \u2014 BOOT SEQUENCE',
      'Loading core modules ..................... OK',
      'Mounting virtual filesystem ............... OK',
      'Starting node.js runtime .................. OK',
      'Connecting to MongoDB cluster .............. OK',
      'Opening socket.io realtime channel ......... OK',
      'Initializing G.LEGENDARY engine ............ OK',
      'Initializing shop module ................... OK',
      'Initializing editor toolkit ................ OK',
      'Verifying security tokens ................... OK',
      'Network interface ........................... ONLINE',
      '',
      'ALL SYSTEMS : ACTIVE'
    ]
  };

  var appReady = false;
  var stopLogoLoop = null;
  var stopLocationGlobe = null;

  function applyConfig() {
    document.title = CONFIG.brand + ' // System Access';
    document.getElementById('logo').textContent = CONFIG.brand;
    document.getElementById('tagline').textContent = CONFIG.tagline;
    document.getElementById('enterLabel').textContent = CONFIG.enterLabel;
    document.getElementById('enterBtn').setAttribute('aria-label', CONFIG.enterLabel);
  }

  function formatLine(line) {
    return line.replace(/(OK|ONLINE)$/, '<span class="ok">$1</span>');
  }

  function runBoot() {
    var logEl = document.getElementById('bootLog');
    var fill = document.getElementById('bootBarFill');
    var lines = CONFIG.bootLines;
    var i = 0;

    function appendLine(text) {
      var row = document.createElement('div');
      row.innerHTML = formatLine(text);
      logEl.appendChild(row);
    }
    function appendCursor() {
      var row = document.createElement('div');
      row.innerHTML = '<span class="cursor-blink">_</span>';
      logEl.appendChild(row);
    }
    function advance() {
      if (i >= lines.length) {
        appendCursor();
        fill.style.width = '100%';
        setTimeout(finishBoot, 900);
        return;
      }
      appendLine(lines[i]);
      fill.style.width = Math.round(((i + 1) / lines.length) * 100) + '%';
      if (lines[i] === 'ALL SYSTEMS NOMINAL') {
        playBeep(660, 0.05);
        setTimeout(function () { playBeep(880, 0.07); }, 70);
      } else if (lines[i] !== '') {
        playBeep(560 + Math.random() * 60, 0.032);
      }
      i++;
      setTimeout(advance, 280 + Math.random() * 40);
    }
    advance();
  }

  function finishBoot() {
    var boot = document.getElementById('bootScreen');
    var app = document.getElementById('app');
    boot.classList.add('boot-hide');
    setTimeout(function () {
      boot.style.display = 'none';
      app.classList.remove('hidden');
      requestAnimationFrame(function () { app.classList.add('app-visible'); });
      appReady = true;
      if (!stopLogoLoop) stopLogoLoop = startLogoLoop();
      if (!stopLocationGlobe) stopLocationGlobe = startLocationGlobe();
    }, 620);
  }

  /* ---- Hero logo cycle: PUBLIC -> ANH TU -> diagonal split -> rejoin -> PUBLIC ---- */

  function initLogoGlobe(canvas) {
    var renderer = null, scene, camera, group, rafId = null, visible = false, ready = false;

    function ensureInit() {
      if (ready || typeof THREE === 'undefined') return;
      try {
        renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        var size = canvas.clientWidth || 100;
        renderer.setSize(size, size, false);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10);
        camera.position.z = 3.1;

        var glow = getComputedStyle(document.documentElement).getPropertyValue('--glow').trim() || '#0abdc6';
        var glowColor = new THREE.Color(glow);

        group = new THREE.Group();
        group.rotation.x = 0.35;
        scene.add(group);

        var coreMat = new THREE.MeshBasicMaterial({ color: glowColor, transparent: true, opacity: 0.10 });
        group.add(new THREE.Mesh(new THREE.SphereGeometry(0.85, 24, 18), coreMat));

        var wireMat = new THREE.MeshBasicMaterial({ color: glowColor, wireframe: true, transparent: true, opacity: 0.8 });
        group.add(new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 12), wireMat));

        var count = 90;
        var positions = new Float32Array(count * 3);
        for (var i = 0; i < count; i++) {
          var theta = Math.random() * Math.PI * 2;
          var phi = Math.acos((Math.random() * 2) - 1);
          var r = 0.93;
          positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
          positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
          positions[i * 3 + 2] = r * Math.cos(phi);
        }
        var pointsGeo = new THREE.BufferGeometry();
        pointsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        var pointsMat = new THREE.PointsMaterial({ color: glowColor, size: 0.05 });
        group.add(new THREE.Points(pointsGeo, pointsMat));

        ready = true;
      } catch (err) {
        ready = false;
      }
    }

    function loop() {
      if (!visible || !ready) return;
      group.rotation.y += 0.02;
      renderer.render(scene, camera);
      rafId = requestAnimationFrame(loop);
    }

    return {
      show: function () {
        ensureInit();
        if (!ready) return;
        visible = true;
        canvas.classList.add('globe-visible');
        if (rafId) cancelAnimationFrame(rafId);
        loop();
      },
      hide: function () {
        visible = false;
        canvas.classList.remove('globe-visible');
        if (rafId) cancelAnimationFrame(rafId);
        rafId = null;
      }
    };
  }

  function startLogoLoop() {
    var wrap = document.getElementById('logoWrap');
    var mainLogo = document.getElementById('logo');
    var halfA = document.getElementById('logoHalfA');
    var halfB = document.getElementById('logoHalfB');
    var globeCanvas = document.getElementById('logoGlobe');
    if (!wrap || !mainLogo || !halfA || !halfB || !globeCanvas) return function () {};

    var origText = CONFIG.brand;
    var altText = 'ANH TU';
    var globe = initLogoGlobe(globeCanvas);
    var timers = [];
    var running = true;

    function schedule(fn, delay) {
      var t = setTimeout(function () { if (running) fn(); }, delay);
      timers.push(t);
      return t;
    }
    function clearTimers() { timers.forEach(clearTimeout); timers = []; }

    function glitchTo(text) {
      mainLogo.classList.add('logo-glitch');
      schedule(function () {
        mainLogo.textContent = text;
        halfA.textContent = text;
        halfB.textContent = text;
      }, 90);
      schedule(function () { mainLogo.classList.remove('logo-glitch'); }, 260);
    }

    function cycle() {
      if (!running) return;
      wrap.classList.remove('split-active');
      mainLogo.style.opacity = '1';
      mainLogo.textContent = origText;
      halfA.textContent = origText;
      halfB.textContent = origText;
      globe.hide();

      schedule(function () { glitchTo(altText); }, 1100);
      schedule(function () { globe.show(); }, 1550);
      schedule(function () {
        wrap.classList.add('split-active');
        mainLogo.style.opacity = '0';
      }, 1900);
      schedule(function () {
        wrap.classList.remove('split-active');
        mainLogo.style.opacity = '1';
      }, 2750);
      schedule(function () { globe.hide(); }, 3050);
      schedule(function () { glitchTo(origText); }, 3350);
      schedule(cycle, 4500);
    }

    cycle();

    return function stop() {
      running = false;
      clearTimers();
      globe.hide();
      wrap.classList.remove('split-active');
      mainLogo.style.opacity = '1';
      mainLogo.textContent = origText;
    };
  }

  /* ---- Location globe: spin -> locate user -> home in on GPS dot + city label ---- */

  function startLocationGlobe() {
    var wrap = document.getElementById('geoGlobeWrap');
    var canvas = document.getElementById('geoGlobe');
    var marker = document.getElementById('geoMarker');
    var label = document.getElementById('geoLabel');
    var status = document.getElementById('geoStatus');
    if (!wrap || !canvas || typeof THREE === 'undefined') return;

    var renderer, scene, camera, group, rafId = null;
    var size = 0;
    var phase = 'spin';           // 'spin' -> 'homing' -> 'locked' -> 'unknown'
    var spinAngle = 0;
    var MIN_SPINS = 2;
    var targetVec = null;
    var targetQuat = null;
    var camTargetZ = 2.55;
    var camZoomZ = 2.05; // not too tight: at low texture res, a coastal point can sit right on the coastline pixel

    function latLonToVector3(lat, lon, r) {
      var phi = (90 - lat) * Math.PI / 180;
      var theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        r * Math.sin(phi) * Math.sin(theta)
      );
    }

    function setStatus(text) { if (status) status.textContent = text; }

    // Simplified world silhouette, baked onto the globe's texture at runtime
    // (no network fetch, so it always renders). Continents are rough
    // approximations — plenty at this display size. Vietnam uses its real
    // coastline (public domain admin-boundary data) and is drawn picked-out
    // in full brightness, so the pin can actually be checked against the
    // country's shape instead of a generic landmass blob.
    var WORLD_LAND = [
      { name: 'africa', points: [[-17, 15], [10, 37], [32, 31], [43, 12], [40, -15], [20, -35], [12, -6], [9, 5]] },
      { name: 'eurasia', points: [[-9, 43], [-9, 53], [5, 60], [30, 60], [60, 68], [140, 68], [145, 45], [140, 35], [122, 25], [110, 22], [100, 20], [95, 15], [77, 8], [68, 24], [60, 30], [48, 42], [26, 40], [18, 40], [3, 43]] },
      { name: 'north-america', points: [[-165, 65], [-95, 70], [-55, 50], [-75, 25], [-97, 20], [-105, 20], [-117, 32], [-125, 49]] },
      { name: 'south-america', points: [[-81, 9], [-50, 5], [-35, -8], [-58, -35], [-68, -55], [-75, -45], [-81, -5]] },
      { name: 'australia', points: [[113, -22], [130, -12], [142, -11], [153, -28], [147, -43], [137, -35], [115, -34]] },
      {
        name: 'vietnam', highlight: true,
        points: [
          [108.05018, 21.55238], [106.715068, 20.696851], [105.881682, 19.75205], [105.662006, 19.058165],
          [106.426817, 18.004121], [107.361954, 16.697457], [108.269495, 16.079742], [108.877107, 15.276691],
          [109.33527, 13.426028], [109.200136, 11.666859], [108.36613, 11.008321], [107.220929, 10.364484],
          [106.405113, 9.53084], [105.158264, 8.59976], [104.795185, 9.241038], [105.076202, 9.918491],
          [104.334335, 10.486544], [105.199915, 10.88931], [106.24967, 10.961812], [105.810524, 11.567615],
          [107.491403, 12.337206], [107.614548, 13.535531], [107.382727, 14.202441], [107.564525, 15.202173],
          [107.312706, 15.908538], [106.556008, 16.604284], [105.925762, 17.485315],
          [105.0, 19.0], [104.0, 20.3], [103.1, 21.5], [103.9, 22.6], [105.3, 23.3], [106.6, 22.9], [107.5, 22.0]
        ]
      }
    ];

    function buildEarthTexture(landHex, bgHex) {
      var W = 1024, H = 512;
      var c = document.createElement('canvas');
      c.width = W; c.height = H;
      var ctx = c.getContext('2d');
      ctx.fillStyle = bgHex;
      ctx.fillRect(0, 0, W, H);

      function proj(lon, lat) { return [(lon + 180) / 360 * W, (90 - lat) / 180 * H]; }

      WORLD_LAND.forEach(function (land) {
        ctx.beginPath();
        land.points.forEach(function (pt, i) {
          var xy = proj(pt[0], pt[1]);
          if (i === 0) ctx.moveTo(xy[0], xy[1]); else ctx.lineTo(xy[0], xy[1]);
        });
        ctx.closePath();
        if (land.highlight) {
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = landHex;
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = landHex;
          ctx.lineWidth = 2.5;
          ctx.stroke();
        } else {
          ctx.fillStyle = landHex + '99';
          ctx.fill();
          ctx.strokeStyle = landHex + 'cc';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      });

      var tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }

    function initScene() {
      renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      size = canvas.clientWidth || 220;
      renderer.setSize(size, size, false);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(42, 1, 0.1, 10);
      camera.position.z = camTargetZ;

      var glowHex = getComputedStyle(document.documentElement).getPropertyValue('--glow').trim() || '#0abdc6';
      var glowColor = new THREE.Color(glowHex);

      group = new THREE.Group();
      scene.add(group);

      // Solid, fully round body with a hand-drawn land/ocean map (dark ocean,
      // bright continents, Vietnam picked out in full brightness) baked onto
      // a canvas at runtime — no external texture fetch, so it always renders
      // the same regardless of network/CDN conditions.
      var earthMat = new THREE.MeshBasicMaterial({ color: glowColor, transparent: false });
      var earthMesh = new THREE.Mesh(new THREE.SphereGeometry(0.94, 64, 40), earthMat);
      group.add(earthMesh);

      var bgHex = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#060a10';
      earthMat.map = buildEarthTexture(glowHex, bgHex);
      earthMat.needsUpdate = true;

      // Faint lat/long grid, sitting just outside the solid body.
      var wireMat = new THREE.MeshBasicMaterial({ color: glowColor, wireframe: true, transparent: true, opacity: 0.22 });
      group.add(new THREE.Mesh(new THREE.SphereGeometry(0.965, 32, 20), wireMat));

      // Fresnel rim glow — guarantees a crisp, perfectly circular, glowing edge
      // regardless of texture load state.
      var rimMat = new THREE.ShaderMaterial({
        uniforms: { glowColor: { value: glowColor } },
        vertexShader: [
          'varying vec3 vNormal;',
          'void main() {',
          '  vNormal = normalize( normalMatrix * normal );',
          '  gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );',
          '}'
        ].join('\n'),
        fragmentShader: [
          'uniform vec3 glowColor;',
          'varying vec3 vNormal;',
          'void main() {',
          '  float intensity = pow( 0.7 - dot( vNormal, vec3(0.0, 0.0, 1.0) ), 3.0 );',
          '  gl_FragColor = vec4( glowColor, clamp(intensity, 0.0, 1.0) );',
          '}'
        ].join('\n'),
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true,
        depthWrite: false
      });
      group.add(new THREE.Mesh(new THREE.SphereGeometry(1.09, 48, 32), rimMat));

      // Sparse decorative "network node" points, layered just above the surface.
      var count = 90;
      var positions = new Float32Array(count * 3);
      for (var i = 0; i < count; i++) {
        var theta = Math.random() * Math.PI * 2;
        var phi = Math.acos((Math.random() * 2) - 1);
        var r = 1.01;
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
      }
      var pointsGeo = new THREE.BufferGeometry();
      pointsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      var pointsMat = new THREE.PointsMaterial({ color: glowColor, size: 0.022, transparent: true, opacity: 0.55 });
      group.add(new THREE.Points(pointsGeo, pointsMat));
    }

    function updateMarkerScreenPosition() {
      if (!targetVec) return;
      var worldPos = targetVec.clone().applyQuaternion(group.quaternion);
      var facing = worldPos.z; // >0 means facing the camera
      var visible = (phase === 'homing' || phase === 'locked') && facing > 0.15;

      if (visible) {
        var projected = worldPos.clone().project(camera);
        var rect = canvas.getBoundingClientRect();
        var wrapRect = wrap.getBoundingClientRect();
        var x = (projected.x * 0.5 + 0.5) * rect.width + (rect.left - wrapRect.left);
        var y = (-projected.y * 0.5 + 0.5) * rect.height + (rect.top - wrapRect.top);
        marker.style.left = x + 'px';
        marker.style.top = y + 'px';
        marker.classList.add('marker-visible');
        label.style.left = x + 'px';
        label.style.top = y + 'px';
        if (phase === 'locked') label.classList.add('label-visible');
      } else {
        marker.classList.remove('marker-visible');
        label.classList.remove('label-visible');
      }
    }

    function loop() {
      var now = performance.now();

      if (phase === 'spin') {
        var step = 0.045;
        group.rotation.y += step;
        spinAngle += step;
        if (spinAngle >= MIN_SPINS * Math.PI * 2 && targetQuat) {
          phase = 'homing';
        }
      } else if (phase === 'homing') {
        group.quaternion.slerp(targetQuat, 0.045);
        camera.position.z += (camZoomZ - camera.position.z) * 0.04;
        var angleLeft = group.quaternion.angleTo(targetQuat);
        if (angleLeft < 0.01) {
          group.quaternion.copy(targetQuat);
          phase = 'locked';
          setStatus('LOCKED: ' + (window.__geoLabelText || 'UNKNOWN LOCATION'));
        }
      } else if (phase === 'locked') {
        // gentle idle breathing so the globe doesn't feel frozen
        var t = now * 0.0006;
        group.rotation.z = Math.sin(t) * 0.015;
        camera.position.z += (camZoomZ - camera.position.z) * 0.04;
      } else if (phase === 'unknown') {
        group.rotation.y += 0.012;
      }

      updateMarkerScreenPosition();
      renderer.render(scene, camera);
      rafId = requestAnimationFrame(loop);
    }

    function reverseGeocode(lat, lon, cb) {
      fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' + lat + '&longitude=' + lon + '&localityLanguage=en')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var city = d.city || d.locality || '';
          var country = d.countryName || '';
          cb(city, country);
        })
        .catch(function () { cb('', ''); });
    }

    function onLocated(lat, lon, approx) {
      reverseGeocode(lat, lon, function (city, country) {
        var parts = [city, country].filter(Boolean);
        var text = parts.length ? parts.join(', ') : (lat.toFixed(2) + ', ' + lon.toFixed(2));
        window.__geoLabelText = text + (approx ? ' (approx.)' : '');
        label.textContent = text;
        targetVec = latLonToVector3(lat, lon, 1);
        targetQuat = new THREE.Quaternion().setFromUnitVectors(targetVec.clone().normalize(), new THREE.Vector3(0, 0, 1));
        setStatus('LOCATION FOUND \u2014 HOMING IN\u2026');
      });
    }

    function onLocateFailed() {
      phase = 'unknown';
      setStatus('LOCATION UNAVAILABLE');
    }

    function fetchWithTimeout(url, ms) {
      var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      var opts = controller ? { signal: controller.signal } : {};
      var timer = controller ? setTimeout(function () { controller.abort(); }, ms) : null;
      return fetch(url, opts).then(function (r) {
        if (timer) clearTimeout(timer);
        return r.json();
      }).catch(function (err) {
        if (timer) clearTimeout(timer);
        throw err;
      });
    }

    // Chained IP-geolocation providers: if one is rate-limited, blocked, or
    // down, the next one is tried automatically before giving up.
    var IP_PROVIDERS = [
      { url: 'https://ipapi.co/json/', parse: function (d) { return d && d.latitude && d.longitude ? [d.latitude, d.longitude] : null; } },
      { url: 'https://ipwho.is/', parse: function (d) { return d && d.success !== false && d.latitude && d.longitude ? [d.latitude, d.longitude] : null; } },
      { url: 'https://get.geojs.io/v1/ip/geo.json', parse: function (d) { return d && d.latitude && d.longitude ? [parseFloat(d.latitude), parseFloat(d.longitude)] : null; } }
    ];

    function ipFallback(index) {
      index = index || 0;
      if (index >= IP_PROVIDERS.length) { onLocateFailed(); return; }
      var provider = IP_PROVIDERS[index];
      fetchWithTimeout(provider.url, 5000)
        .then(function (d) {
          var coords = provider.parse(d);
          if (coords) onLocated(coords[0], coords[1], true);
          else ipFallback(index + 1);
        })
        .catch(function () { ipFallback(index + 1); });
    }

    function locate() {
      setStatus('REQUESTING GPS ACCESS\u2026');
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function (pos) { onLocated(pos.coords.latitude, pos.coords.longitude); },
          function () { setStatus('GPS DENIED \u2014 TRYING IP LOOKUP\u2026'); ipFallback(0); },
          { enableHighAccuracy: true, timeout: 7000, maximumAge: 300000 }
        );
      } else {
        ipFallback(0);
      }
    }

    try {
      initScene();
    } catch (err) {
      return;
    }
    setStatus('SCANNING ORBIT\u2026');
    locate();
    loop();

    window.addEventListener('resize', function () {
      if (!renderer) return;
      var s = canvas.clientWidth || size;
      if (s !== size) {
        size = s;
        renderer.setSize(size, size, false);
      }
    });

    return function stop() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;
    };
  }

  var KB_ROWS = [

  var SOUND_PREF_KEY = 'public.soundEnabled';
  var audioCtx = null;
  var soundEnabled = true; // on by default; only an explicit past toggle overrides this
  try {
    var storedSoundPref = localStorage.getItem(SOUND_PREF_KEY);
    if (storedSoundPref !== null) soundEnabled = storedSoundPref === '1';
  } catch (err) {}
  function ensureAudio() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch (err) {
      soundEnabled = false;

  }
  function playBeep(freq, dur) {
    if (!soundEnabled) return;
    ensureAudio();
    if (!audioCtx) return;
    freq = freq || (220 + Math.random() * 80);
    dur = dur || 0.03;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.value = 0.03;
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.stop(audioCtx.currentTime + dur);
  }

  var soundToggleBtn = document.getElementById('soundToggle');
  if (soundToggleBtn) {
    soundToggleBtn.textContent = soundEnabled ? 'SOUND: ON' : 'SOUND: OFF';
    soundToggleBtn.setAttribute('aria-pressed', String(soundEnabled));
  }

  soundToggleBtn.addEventListener('click', function (e) {
    soundEnabled = !soundEnabled;
    ensureAudio();
    try { localStorage.setItem(SOUND_PREF_KEY, soundEnabled ? '1' : '0'); } catch (err) {}
    e.target.textContent = soundEnabled ? 'SOUND: ON' : 'SOUND: OFF';
    e.target.setAttribute('aria-pressed', String(soundEnabled));
  });

  var themeOpts = document.querySelectorAll('.theme-opt');
  themeOpts.forEach(function (btn) {
    btn.addEventListener('click', function () {

  /* ---- Post-enter cinematic: real dragon model (Dragon.glb) swoops in,
     roars, then the site is revealed. The GLB is preloaded in the
     background as soon as the page boots, so it is usually ready well
     before the visitor presses ENTER. ---- */

  var dragonGltf = null;
  var dragonLoadPromise = null;
  var dragonNormalized = false;

  function preloadDragonModel() {
    if (typeof THREE === 'undefined' || typeof THREE.GLTFLoader === 'undefined') return;
    var loader = new THREE.GLTFLoader();
    dragonLoadPromise = new Promise(function (resolve, reject) {
      loader.load(
        CONFIG.dragonModelPath,
        function (gltf) { dragonGltf = gltf; resolve(gltf); },
        undefined,
        function (err) { reject(err); }
      );
    }).catch(function (err) {
      console.warn('Dragon model failed to load:', err);
      return null;
    });
  }

  function smooth01(a, b, x) {
    if (b <= a) return x < a ? 0 : 1;
    var k = Math.min(1, Math.max(0, (x - a) / (b - a)));
    return k * k * (3 - 2 * k);
  }

  function normalizeDragon(model) {
    if (dragonNormalized) return;
    var box = new THREE.Box3().setFromObject(model);
    var size = new THREE.Vector3();
    box.getSize(size);
    var center = new THREE.Vector3();
    box.getCenter(center);
    var maxDim = Math.max(size.x, size.y, size.z) || 1;
    var scale = 6 / maxDim;
    model.scale.setScalar(scale);
    model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
    dragonNormalized = true;
  }

  function playDragonIntro(onDone) {
    var overlay = document.getElementById('dragonIntro');
    var canvas = document.getElementById('dragonCanvas');
    var flash = document.getElementById('dragonFlash');

    if (!overlay || !canvas || typeof THREE === 'undefined' || typeof THREE.GLTFLoader === 'undefined') {
      if (onDone) onDone();
      return;
    }

    var renderer, scene, camera, rig, model, mixer, flyAction, idleAction;
    var rafId = null, startTime = null, lastT = null;
    var roarFired = false;
    var decayTriggered = false;
    var finished = false;
    var resizeHandler = null;
    var particlePoints = null, particleGeo = null, particleMat = null;
    var particlePositions = null, particleVel = null, particleCount = 0;

    var dcEl = document.getElementById('dragonCaption');
    var dcTextEl = document.getElementById('dcText');
    var captionTimer = null;
    var captionLines = CONFIG.dragonCaptionLines || [];
    var flapTimer = null;
    var flapStartPerf = null;

    var ROAR_AT = CONFIG.dragonRoarAt / 1000;
    var DECAY_START = ROAR_AT + CONFIG.dragonDecayDelay / 1000;
    var DECAY_DURATION = CONFIG.dragonDecayDuration / 1000;

    // The caption types every line (plus a delete pass between lines) after
    // the decay begins, so give the scene enough runway to show it in full —
    // without this the intro would cut away mid-sentence.
    var captionDuration = 0;
    captionLines.forEach(function (line, idx) {
      captionDuration += line.length * CONFIG.dragonCaptionTypeSpeed;
      captionDuration += CONFIG.dragonCaptionHoldMs;
      if (idx < captionLines.length - 1) captionDuration += line.length * CONFIG.dragonCaptionDeleteSpeed;
    });
    captionDuration = captionDuration / 1000;

    var TOTAL = Math.max(DECAY_START + DECAY_DURATION + 0.15, DECAY_START + captionDuration + 0.5);
    var CROSSFADE_AT = Math.max(0, ROAR_AT - 0.4);

    function triggerRoar() {
      roarFired = true;
      flash.classList.add('flash-active');
      setTimeout(function () { flash.classList.remove('flash-active'); }, 260);
      playRoarSfx();
    }

    /* ---- Wing flaps: a soft whoosh timed to the dragon's actual flap rate.
       Dragon.glb's "flying" clip was measured directly (FFT over the wing-
       bone rotation keyframes, cross-checked across both wings): a full
       down/up cycle takes ~3.28s, not the ~0.5s originally guessed here. ---- */
    function wingFlapTick() {
      if (finished || decayTriggered) return;
      var elapsed = (performance.now() - flapStartPerf) / 1000;
      if (elapsed >= ORBIT + LANDING) return; // fully landed — no more flapping
      var strength = elapsed <= ORBIT ? 1 : (1 - smooth01(0, LANDING, elapsed - ORBIT));
      playWingFlapSfx(strength);
      flapTimer = setTimeout(wingFlapTick, 3200 + Math.random() * 180);
    }

    function playWingFlapSfx(strength) {
      if (!soundEnabled) return;
      ensureAudio();
      if (!audioCtx) return;
      var vol = 0.16 * (strength == null ? 1 : strength);
      if (vol <= 0.004) return;
      var ctx = audioCtx;
      var now = ctx.currentTime;

      var bufSize = Math.floor(ctx.sampleRate * 0.32);
      var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      var data = buf.getChannelData(0);
      for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      var src = ctx.createBufferSource();
      src.buffer = buf;

      var filt = ctx.createBiquadFilter();
      filt.type = 'bandpass';
      filt.frequency.setValueAtTime(240, now);
      filt.frequency.linearRampToValueAtTime(85, now + 0.3);
      filt.Q.value = 0.85;

      var gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(vol, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);

      src.connect(filt).connect(gain).connect(ctx.destination);
      src.start(now);
      src.stop(now + 0.32);
    }

    function shakeAmount(t) {
      if (!roarFired) return 0;
      var dt = t - ROAR_AT;
      if (dt < 0 || dt > 0.45) return 0;
      return (1 - dt / 0.45) * 0.32;
    }

    var ORBIT = CONFIG.dragonOrbitDuration / 1000;
    var LANDING = CONFIG.dragonLandingDuration / 1000;

    function flightPos(t) {
      var p = Math.min(1, t / ORBIT);
      var eased = smooth01(0, 1, p);
      var loops = 1.25; // how many times it loops the screen before settling
      var angle = 0.5 + p * loops * Math.PI * 2;
      var radius = THREE.MathUtils.lerp(8.5, 0, eased); // spirals inward
      return {
        x: Math.sin(angle) * radius,
        y: 0.25 + 0.9 * Math.sin(angle * 1.4) * (1 - eased * 0.6),
        z: -1.2 + Math.cos(angle) * radius * 0.5
      };
    }

    function orbitRot(t) {
      var eps = 0.02;
      var p0 = flightPos(Math.max(0, t - eps));
      var p1 = flightPos(Math.min(ORBIT, t + eps));
      var dx = p1.x - p0.x, dz = p1.z - p0.z;
      var rotY = (Math.abs(dx) + Math.abs(dz) > 1e-5) ? Math.atan2(dx, dz) : 0;
      var rotZ = -0.3 * (1 - smooth01(0, 1, t / ORBIT));
      return { rotY: rotY, rotZ: rotZ };
    }

    function entranceOffset(t) {
      if (t <= ORBIT) {
        var pos = flightPos(t);
        var rot = orbitRot(t);
        return { x: pos.x, y: pos.y, z: pos.z, rotY: rot.rotY, rotZ: rot.rotZ };
      }
      if (t <= ORBIT + LANDING) {
        // smooth, slow glide from wherever the orbit ended down into the resting spot —
        // avoids snapping straight to center, so the landing reads as a deliberate descent.
        var startPos = flightPos(ORBIT);
        var startRot = orbitRot(ORBIT);
        var glide = smooth01(0, LANDING, t - ORBIT);
        return {
          x: THREE.MathUtils.lerp(startPos.x, 0, glide),
          y: THREE.MathUtils.lerp(startPos.y, 0, glide),
          z: THREE.MathUtils.lerp(startPos.z, 0, glide),
          rotY: THREE.MathUtils.lerp(startRot.rotY, 0, glide),
          rotZ: THREE.MathUtils.lerp(startRot.rotZ, 0, glide)
        };
      }
      // settled hover in front of camera, ready to roar
      var post = t - ORBIT - LANDING;
      return { x: 0, y: 0.12 * Math.sin(post * 1.6), z: 0, rotY: 0, rotZ: 0 };
    }

    function setupScene(gltf) {
      renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0.6, 9);
      camera.lookAt(0, 0.4, 0);

      rig = new THREE.Group();
      scene.add(rig);

      scene.add(new THREE.AmbientLight(0xffffff, 0.75));
      var key = new THREE.DirectionalLight(0xffffff, 1.1);
      key.position.set(4, 6, 8);
      scene.add(key);
      var glowHex = getComputedStyle(document.documentElement).getPropertyValue('--glow').trim() || '#0abdc6';
      var rim = new THREE.PointLight(new THREE.Color(glowHex), 1.4, 40);
      rim.position.set(-5, -1, 6);
      scene.add(rim);

      model = gltf.scene;
      normalizeDragon(model);
      model.visible = true;
      rig.add(model);

      mixer = new THREE.AnimationMixer(model);
      var clips = gltf.animations || [];
      function findClip(name) {
        for (var i = 0; i < clips.length; i++) if (clips[i].name === name) return clips[i];
        return clips[0];
      }
      var flyClip = findClip('flying');
      var idleClip = findClip('idle');
      flyAction = flyClip ? mixer.clipAction(flyClip) : null;
      idleAction = idleClip ? mixer.clipAction(idleClip) : null;
      if (flyAction) { flyAction.reset().play(); flyAction.setEffectiveWeight(1); }
      if (idleAction) { idleAction.reset().play(); idleAction.setEffectiveWeight(0); }

      resizeHandler = function () {
        renderer.setSize(window.innerWidth, window.innerHeight, false);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      };
      resizeHandler();
      window.addEventListener('resize', resizeHandler);
    }

    function buildParticles() {
      var glowHex = getComputedStyle(document.documentElement).getPropertyValue('--glow').trim() || '#0abdc6';
      var glowColor = new THREE.Color(glowHex);
      var white = new THREE.Color(0xffffff);

      var meshList = [];
      model.traverse(function (o) {
        if (o.isMesh && o.geometry && o.geometry.attributes && o.geometry.attributes.position) meshList.push(o);
      });

      var totalVerts = 0;
      meshList.forEach(function (m) { totalVerts += m.geometry.attributes.position.count; });
      var TARGET = 850;
      var stride = Math.max(1, Math.floor(totalVerts / TARGET));

      var origins = [];
      var v = new THREE.Vector3();
      meshList.forEach(function (m) {
        m.updateWorldMatrix(true, false);
        var posAttr = m.geometry.attributes.position;
        for (var i = 0; i < posAttr.count; i += stride) {
          v.fromBufferAttribute(posAttr, i);
          v.applyMatrix4(m.matrixWorld);
          origins.push(v.clone());
        }
      });

      var total = origins.length;
      var centerPt = new THREE.Vector3();
      for (var c = 0; c < total; c++) centerPt.add(origins[c]);
      if (total > 0) centerPt.multiplyScalar(1 / total);

      particleCount = total;
      particlePositions = new Float32Array(total * 3);
      particleVel = new Float32Array(total * 3);
      var colors = new Float32Array(total * 3);

      for (var idx = 0; idx < total; idx++) {
        var o = origins[idx];
        var ix = idx * 3;
        particlePositions[ix] = o.x;
        particlePositions[ix + 1] = o.y;
        particlePositions[ix + 2] = o.z;

        var outward = o.clone().sub(centerPt);
        if (outward.lengthSq() < 1e-6) outward.set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5);
        outward.normalize();
        var speed = 1.1 + Math.random() * 2.3;
        var vel = outward.multiplyScalar(speed);
        vel.y += 0.6 + Math.random() * 0.6;
        particleVel[ix] = vel.x;
        particleVel[ix + 1] = vel.y;
        particleVel[ix + 2] = vel.z;

        var col = white.clone().lerp(glowColor, Math.random() * 0.7);
        colors[ix] = col.r; colors[ix + 1] = col.g; colors[ix + 2] = col.b;
      }

      particleGeo = new THREE.BufferGeometry();
      particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      particleMat = new THREE.PointsMaterial({
        size: 0.12, vertexColors: true, transparent: true, opacity: 1,
        blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true
      });
      particlePoints = new THREE.Points(particleGeo, particleMat);
      scene.add(particlePoints);
    }

    function triggerDecay() {
      decayTriggered = true;
      buildParticles();
      model.visible = false;
      showCaption();
    }

    /* ---- Terminal caption: typed one line at a time inside the box that
       fades in as the dragon dissolves. A line types out, holds, then is
       deleted character-by-character before the next line types in its
       place; the final line is left on screen. ---- */
    function showCaption() {
      if (!dcEl || !dcTextEl || !captionLines.length) return;
      dcEl.classList.add('dc-visible');
      captionTimer = setTimeout(function () { typeLine(0, 0); }, 350);
    }

    function typeLine(lineIdx, charIdx) {
      if (finished) return;
      var line = captionLines[lineIdx];
      if (!line) return;
      dcTextEl.textContent = line.slice(0, charIdx);
      if (charIdx > 0) playBeep(760 + Math.random() * 140, 0.02);
      if (charIdx < line.length) {
        captionTimer = setTimeout(function () { typeLine(lineIdx, charIdx + 1); }, CONFIG.dragonCaptionTypeSpeed);
      } else if (lineIdx < captionLines.length - 1) {
        captionTimer = setTimeout(function () { deleteLine(lineIdx, line.length); }, CONFIG.dragonCaptionHoldMs);
      }
      // last line just stays put, cursor still blinking, until the scene fades out
    }

    function deleteLine(lineIdx, charIdx) {
      if (finished) return;
      var line = captionLines[lineIdx];
      var next = charIdx - 1;
      dcTextEl.textContent = line.slice(0, next);
      playBeep(380 + Math.random() * 60, 0.016);
      if (next > 0) {
        captionTimer = setTimeout(function () { deleteLine(lineIdx, next); }, CONFIG.dragonCaptionDeleteSpeed);
      } else {
        captionTimer = setTimeout(function () { typeLine(lineIdx + 1, 0); }, 200);
      }
    }

    function updateParticles(dt, elapsed) {
      if (!particleCount) return;
      var drag = Math.exp(-1.5 * dt);
      var gravity = 0.35;
      for (var i = 0; i < particleCount; i++) {
        var ix = i * 3;
        particleVel[ix] *= drag;
        particleVel[ix + 1] = particleVel[ix + 1] * drag - gravity * dt;
        particleVel[ix + 2] *= drag;
        particlePositions[ix] += particleVel[ix] * dt;
        particlePositions[ix + 1] += particleVel[ix + 1] * dt;
        particlePositions[ix + 2] += particleVel[ix + 2] * dt;
      }
      particleGeo.attributes.position.needsUpdate = true;
      var fade = 1 - smooth01(0, DECAY_DURATION * 0.85, elapsed);
      particleMat.opacity = Math.max(0, fade);
      particleMat.size = 0.05 + 0.09 * fade;
    }

    function finish() {
      if (finished) return;
      finished = true;
      if (rafId) cancelAnimationFrame(rafId);
      if (resizeHandler) window.removeEventListener('resize', resizeHandler);
      if (captionTimer) clearTimeout(captionTimer);
      if (flapTimer) clearTimeout(flapTimer);
      if (dcEl) dcEl.classList.remove('dc-visible');
      if (dcTextEl) dcTextEl.textContent = '';
      overlay.classList.remove('dragon-visible');
      setTimeout(function () {
        overlay.style.pointerEvents = 'none';
        if (particlePoints) {
          scene.remove(particlePoints);
          particleGeo.dispose();
          particleMat.dispose();
          particlePoints = null;
        }
        if (renderer) renderer.dispose();
      }, 850);
      if (onDone) onDone();
    }

    function frame(now) {
      if (startTime === null) startTime = now;
      var t = (now - startTime) / 1000;
      var dt = lastT === null ? 0.016 : Math.min(0.05, t - lastT);
      lastT = t;

      if (!roarFired && t >= ROAR_AT) triggerRoar();
      if (!decayTriggered && t >= DECAY_START) triggerDecay();

      if (!decayTriggered) {
        if (mixer) mixer.update(dt);
        if (flyAction && idleAction) {
          var w = smooth01(CROSSFADE_AT, CROSSFADE_AT + 0.5, t);
          flyAction.setEffectiveWeight(1 - w);
          idleAction.setEffectiveWeight(w);
        }
        var off = entranceOffset(t);
        var shake = shakeAmount(t);
        rig.position.set(off.x + (Math.random() - 0.5) * shake, off.y + (Math.random() - 0.5) * shake, off.z);
        rig.rotation.y = off.rotY;
        rig.rotation.z = off.rotZ || 0;
      } else {
        updateParticles(dt, t - DECAY_START);
      }

      renderer.render(scene, camera);

      if (t < TOTAL) {
        rafId = requestAnimationFrame(frame);
      } else {
        finish();
      }
    }

    function start(gltf) {
      if (!gltf) { finish(); return; }
      try {
        setupScene(gltf);
        rafId = requestAnimationFrame(frame);
        flapStartPerf = performance.now();
        flapTimer = setTimeout(wingFlapTick, 250);
      } catch (err) {
        finish();
      }
    }

    try {
      overlay.style.pointerEvents = 'auto';
      requestAnimationFrame(function () { overlay.classList.add('dragon-visible'); });

      if (dragonGltf) {
        start(dragonGltf);
      } else if (dragonLoadPromise) {
        dragonLoadPromise.then(start);
        setTimeout(function () { if (!finished && !renderer) finish(); }, 12000); // safety timeout
      } else {
        finish();
      }
    } catch (err) {
      finish();
    }
  }

  /* Layered, synthesized dragon roar: a filtered noise burst (breath/rasp) +
     two detuned sawtooth oscillators sweeping down in pitch (throat growl) +
     a short sub-bass thump (chest impact). Built entirely with the Web Audio
     API, so no external audio file is needed. */
  function playRoarSfx() {
    if (!soundEnabled) return;
    ensureAudio();
    if (!audioCtx) return;
    var ctx = audioCtx;
    var now = ctx.currentTime;
    var master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.5, now + 0.05);
    master.gain.exponentialRampToValueAtTime(0.32, now + 0.35);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 1.4);
    master.connect(ctx.destination);

    [0, -9].forEach(function (detune) {
      var osc = ctx.createOscillator();
      var oGain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.detune.value = detune;
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(48, now + 1.1);
      var filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.setValueAtTime(1400, now);
      filt.frequency.exponentialRampToValueAtTime(220, now + 1.2);
      oGain.gain.setValueAtTime(0.6, now);
      osc.connect(filt).connect(oGain).connect(master);
      osc.start(now);
      osc.stop(now + 1.3);
    });

    var bufSize = ctx.sampleRate * 1.1;
    var noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = noiseBuf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    var noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    var noiseFilt = ctx.createBiquadFilter();
    noiseFilt.type = 'bandpass';
    noiseFilt.frequency.setValueAtTime(900, now);
    noiseFilt.frequency.exponentialRampToValueAtTime(200, now + 1.0);
    noiseFilt.Q.value = 0.8;
    var noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.0001, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.55, now + 0.08);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
    noise.connect(noiseFilt).connect(noiseGain).connect(master);
    noise.start(now);
    noise.stop(now + 1.1);

    var sub = ctx.createOscillator();
    var subGain = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(95, now);
    sub.frequency.exponentialRampToValueAtTime(38, now + 0.35);
    subGain.gain.setValueAtTime(0.0001, now);
    subGain.gain.exponentialRampToValueAtTime(0.8, now + 0.03);
    subGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
    sub.connect(subGain).connect(master);
    sub.start(now);
    sub.stop(now + 0.5);
  }


  /* Splits the current screen into a top half and a bottom half, then
     flies the top half up and off-screen while the bottom half sinks
     down and off-screen, revealing whatever screen comes next. Takes
     a snapshot of the live markup (not a live reference) so the
     original page underneath is untouched and can keep running. */
  function playCrossCutTransition(onComplete) {
    var DURATION = CONFIG.crossCutDuration; // total ms for this whole step
    var PRE_DELAY = 300;   // seam flashes on, halves hold in place
    var POST_DELAY = 200;  // brief hold after the halves are fully gone
    var FLY_DURATION = Math.max(200, DURATION - PRE_DELAY - POST_DELAY);

    var wrap = document.createElement('div');
    wrap.className = 'cross-cut-wrap';

    var seam = document.createElement('div');
    seam.className = 'cross-cut-seam';

    function stripIds(node) {
      if (node.hasAttribute && node.hasAttribute('id')) node.removeAttribute('id');
      var withIds = node.querySelectorAll ? node.querySelectorAll('[id]') : [];
      for (var i = 0; i < withIds.length; i++) withIds[i].removeAttribute('id');
    }

    var top = document.createElement('div');
    top.className = 'cross-cut-half cross-cut-top';
    var topInner = document.createElement('div');
    topInner.className = 'cross-cut-inner';
    topInner.innerHTML = document.body.innerHTML;
    stripIds(topInner);
    top.appendChild(topInner);

    var bottom = document.createElement('div');
    bottom.className = 'cross-cut-half cross-cut-bottom';
    var bottomInner = document.createElement('div');
    bottomInner.className = 'cross-cut-inner';
    bottomInner.innerHTML = document.body.innerHTML;
    stripIds(bottomInner);
    bottom.appendChild(bottomInner);

    // match the fly transition timing to the configured duration
    top.style.transition = 'transform ' + (FLY_DURATION / 1000) + 's cubic-bezier(0.7,0,0.85,1), opacity ' + (FLY_DURATION / 1000) + 's ease-in';
    bottom.style.transition = top.style.transition;

    wrap.appendChild(top);
    wrap.appendChild(bottom);
    wrap.appendChild(seam);
    document.body.appendChild(wrap);

    var finished = false;
    function done() {
      if (finished) return;
      finished = true;
      wrap.remove();
      if (onComplete) onComplete();
    }

    requestAnimationFrame(function () {
      seam.classList.add('cross-cut-seam-visible');
      setTimeout(function () {
        top.classList.add('cross-cut-fly-up');
        bottom.classList.add('cross-cut-fly-down');
        seam.classList.remove('cross-cut-seam-visible');
      }, PRE_DELAY);
    });

    setTimeout(done, DURATION);
  }

  function enterSystem() {
    if (!appReady) return;
    if (stopLogoLoop) { stopLogoLoop(); stopLogoLoop = null; }
    appReady = false;
    var app = document.getElementById('app');
    app.classList.add('app-exit');
    playBeep(600, 0.08);
    setTimeout(function () {
      playDragonIntro(function onRevealed() {
        app.classList.remove('app-exit');
        appReady = true;
        stopLogoLoop = startLogoLoop();
        setTimeout(function () {
          playCrossCutTransition(function () {
            if (CONFIG.enterHref !== '#') {
              window.location.href = CONFIG.enterHref;
            }
          });
        }, 900);
      });
    }, 650);
  }
  document.getElementById('enterBtn').addEventListener('click', enterSystem);

  window.addEventListener('keydown', function (e) {
    setKeyActive(e.code, true);
    if (appReady) playBeep();
    if (e.key === 'Enter' && appReady) enterSystem();
  });
  window.addEventListener('keyup', function (e) {
    setKeyActive(e.code, false);
  });

  /* ---- Matrix rain: ambient falling-glyph backdrop behind the whole UI.
     Lives at z-index 1 (below .app, above the base dot-grid), so it reads
     through the near-transparent panels and the empty space around the
     hero. It runs continuously from load — it's simply hidden behind the
     opaque boot screen / dragon intro until those clear — and its colour
     tracks the active --glow theme automatically each frame, so toggling
     CYAN/AMBER re-tints it with no extra wiring. ---- */
  function startMatrixRain() {
    var canvas = document.getElementById('matrixRain');
    if (!canvas || !canvas.getContext) return;
    var ctx = canvas.getContext('2d');
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var GLYPHS = '01'.split('');
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var fontSize, cols, drops, speeds, cssW, cssH;

    function resize() {
      cssW = window.innerWidth;
      cssH = window.innerHeight;
      fontSize = cssW < 520 ? 14 : 17;
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(cssW / fontSize);
      drops = new Array(cols);
      speeds = new Array(cols);
      for (var i = 0; i < cols; i++) {
        drops[i] = Math.floor(Math.random() * -(cssH / fontSize));
        speeds[i] = 0.5 + Math.random() * 0.5;
      }
    }

    function drawFrame() {
      var style = getComputedStyle(document.documentElement);
      var glow = style.getPropertyValue('--glow').trim() || '#0abdc6';
      var bright = style.getPropertyValue('--text').trim() || '#d7fbff';
      ctx.fillStyle = 'rgba(6, 10, 16, 0.1)';
      ctx.fillRect(0, 0, cssW, cssH);
      ctx.font = fontSize + 'px "IBM Plex Mono", monospace';
      ctx.textBaseline = 'top';
      for (var i = 0; i < cols; i++) {
        var y = drops[i] * fontSize;
        if (y > -fontSize && y < cssH + fontSize) {
          var isHead = Math.random() > 0.85;
          ctx.globalAlpha = isHead ? 0.9 : 0.55;
          ctx.fillStyle = isHead ? bright : glow;
          ctx.fillText(GLYPHS[(Math.random() * GLYPHS.length) | 0], i * fontSize, y);
          ctx.globalAlpha = 1;
        }
        drops[i] += speeds[i];
        if (y > cssH && Math.random() > 0.975) drops[i] = Math.floor(Math.random() * -40);
      }
    }

    var running = false, rafId = null, lastTick = 0;
    var FRAME_MS = 60; // a measured cadence, not a full 60fps redraw

    function loop(ts) {
      if (!running) return;
      if (ts - lastTick >= FRAME_MS) { lastTick = ts; drawFrame(); }
      rafId = requestAnimationFrame(loop);
    }
    function start() { if (running) return; running = true; lastTick = 0; rafId = requestAnimationFrame(loop); }
    function stop() { running = false; if (rafId) cancelAnimationFrame(rafId); rafId = null; }

    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) stop();
      else if (!reduceMotion) start();
    });

    if (reduceMotion) drawFrame(); else start();
  }

  applyConfig();
  buildKeyboard();
  preloadDragonModel();
  updateClock();
  updateUptime();
  updateStats();
  startMatrixRain();
  setInterval(updateClock, 1000);
  setInterval(updateUptime, 1000);
  setInterval(updateStats, 1400);
  setInterval(pushLog, 1900);

  (function () {
    var gate = document.getElementById('bootGate');
    var gateOpened = false;
    function openGate() {
      if (gateOpened) return;
      gateOpened = true;
      ensureAudio();
      if (gate) {
        gate.classList.add('gate-hide');
        setTimeout(function () { gate.style.display = 'none'; }, 400);
      }
      runBoot();
    }
    if (gate) {
      ['pointerdown', 'keydown', 'touchstart'].forEach(function (evt) {
        gate.addEventListener(evt, openGate, { once: true, passive: true });
      });
      setTimeout(openGate, 5000); // don't strand a visitor who never taps
    } else {
      runBoot();
    }
  })();
})();
</script>
</body>
</html>
