<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quên mật khẩu – Public</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Public">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="/css/global.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 16px; }
.auth-box { width: 100%; max-width: 400px; animation: fadeIn 0.4s ease; }
.back-btn { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; transition: var(--transition); }
.back-btn:hover { color: var(--text-primary); }
.auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 24px; text-align: center; }
.icon-big { font-size: 48px; margin-bottom: 12px; }
.auth-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
.auth-desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
.form { display: flex; flex-direction: column; gap: 14px; }
.success-state { display: none; text-align: center; }
.success-state.show { display: block; }
.form-state.hide { display: none; }
</style>
</head>
<body>
<div class="auth-box">
  <a href="login.html" class="back-btn">← Quay lại đăng nhập</a>
  <div class="auth-card">
    <div class="form-state" id="formState">
      <div class="icon-big">🔐</div>
      <div class="auth-title">Quên mật khẩu?</div>
      <div class="auth-desc">Nhập email của bạn và chúng tôi sẽ gửi link đặt lại mật khẩu</div>
      <div class="form">
        <div class="input-group">
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input class="input has-icon" id="email" type="email" placeholder="email@example.com">
          </div>
        </div>
        <button class="btn btn-primary" id="submitBtn" style="width:100%;padding:13px" onclick="submit()">Gửi link đặt lại</button>
      </div>
    </div>
    <div class="success-state" id="successState">
      <div class="icon-big">📬</div>
      <div class="auth-title">Email đã được gửi!</div>
      <div class="auth-desc">Kiểm tra hộp thư của bạn và nhấn vào link trong email để đặt lại mật khẩu.<br><br><small>Không thấy email? Kiểm tra thư mục Spam.</small></div>
      <a href="login.html" class="btn btn-primary" style="display:inline-flex;margin-top:8px">← Về đăng nhập</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
async function submit() {
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submitBtn');
  if (!email) return Toast.error('Vui lòng nhập email');

  loadingBtn(btn, true);
  const res = await API.post('/auth/forgot-password', { email });
  loadingBtn(btn, false);

  if (res?.success) {
    document.getElementById('formState').classList.add('hide');
    document.getElementById('successState').classList.add('show');
  } else {
    Toast.error(res?.message || 'Có lỗi xảy ra');
  }
}
document.getElementById('email').addEventListener('keydown', e => e.key === 'Enter' && submit());
</script>
</body>
</html>
