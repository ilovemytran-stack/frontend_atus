<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khám phá – Public</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Public">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/feed.css">
<style>
.explore-search { padding: 16px; max-width: 640px; margin: 0 auto; }
.explore-search .input-wrap { background: var(--bg-elevated); border-radius: var(--radius-full); border: 1px solid var(--border); }
.explore-search .input { padding: 12px 16px 12px 44px; }
.explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; max-width: 640px; margin: 0 auto; padding: 0 3px; }
.explore-item { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; }
.explore-item img, .explore-item video { width: 100%; height: 100%; object-fit: cover; }
.explore-item-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0; transition: opacity 0.2s; color: #fff; font-weight: 700; }
.explore-item:hover .explore-item-overlay { opacity: 1; }
.explore-video-badge { position: absolute; top: 6px; right: 6px; color: #fff; font-size: 16px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
.search-results-section { max-width: 640px; margin: 0 auto; padding: 0 16px; }
.search-section-title { font-weight: 700; font-size: 0.95rem; margin: 16px 0 10px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <header class="mobile-header">
      <button class="btn btn-ghost btn-icon" id="menu-btn">☰</button>
      <div class="mobile-header-logo">Khám phá</div>
      <div style="width:40px"></div>
    </header>

    <div class="explore-search">
      <div class="input-wrap">
        <span class="input-icon">🔍</span>
        <input class="input" id="searchInput" placeholder="Tìm kiếm người dùng, bài viết, video..." oninput="handleSearch()">
      </div>
    </div>

    <div id="searchResults" style="display:none"></div>

    <div id="exploreDefault">
      <div class="explore-grid" id="exploreGrid"></div>
    </div>
  </main>

  <aside class="right-sidebar">
    <div id="suggestedUsers"></div>
  </aside>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<script src="/js/api.js"></script>
<script src="/js/layout.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Layout.init();
  loadExploreGrid();
  loadSuggestedUsers();
});

async function loadExploreGrid() {
  const [postsRes, videosRes] = await Promise.all([
    API.get('/feed/explore?page=1&limit=12'),
    API.get('/videos/explore?page=1&limit=12'),
  ]);
  const items = [];
  if (postsRes?.success) postsRes.posts.forEach(p => { if (p.images?.[0]) items.push({ type: 'post', url: p.images[0].url, id: p._id, likes: p.likesCount }); });
  if (videosRes?.success) videosRes.videos.forEach(v => items.push({ type: 'video', url: v.thumbnail || v.url, id: v._id, views: v.viewsCount }));
  items.sort(() => Math.random() - 0.5);

  document.getElementById('exploreGrid').innerHTML = items.map(it => `
    <a href="${it.type === 'video' ? 'videos.html' : 'post.html?id=' + it.id}" class="explore-item">
      ${it.type === 'video' ? `<video src="${it.url}" muted></video><span class="explore-video-badge">▶</span>` : `<img src="${it.url}" alt="" loading="lazy">`}
      <div class="explore-item-overlay">${it.type === 'video' ? '👁 ' + formatNum(it.views) : '❤️ ' + formatNum(it.likes)}</div>
    </a>`).join('');
}

const handleSearch = debounce(async () => {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('exploreDefault').style.display = 'block';
    return;
  }
  document.getElementById('exploreDefault').style.display = 'none';
  const resultsEl = document.getElementById('searchResults');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div class="skeleton" style="height:100px;margin:16px;border-radius:16px"></div>';

  const res = await API.get(`/search?q=${encodeURIComponent(q)}`);
  if (!res?.success) return;
  const { users = [], posts = [], videos = [] } = res.results;

  let html = '<div class="search-results-section">';
  if (users.length) {
    html += `<div class="search-section-title">👤 Người dùng</div>`;
    html += users.map(u => `
      <a href="profile.html?u=${u.username}" class="suggested-user">
        <img src="${avatarURL(u)}" class="avatar avatar-sm" alt="">
        <div class="suggested-user-info">
          <div class="suggested-user-name">${u.displayName || u.username}</div>
          <div class="suggested-user-meta">@${u.username} · ${formatNum(u.followersCount)} theo dõi</div>
        </div>
      </a>`).join('');
  }
  if (videos.length) {
    html += `<div class="search-section-title">🎬 Video</div><div class="explore-grid" style="margin:0 -16px">`;
    html += videos.map(v => `<a href="videos.html" class="explore-item"><video src="${v.url}" muted></video></a>`).join('');
    html += `</div>`;
  }
  if (posts.length) {
    html += `<div class="search-section-title">📝 Bài viết</div>`;
    html += posts.map(p => `<a href="post.html?id=${p._id}" style="display:block;padding:10px 0;border-bottom:1px solid var(--border)"><strong>${p.author.displayName}</strong>: ${(p.content||'').slice(0,80)}</a>`).join('');
  }
  if (!users.length && !posts.length && !videos.length) html += '<p style="text-align:center;color:var(--text-muted);padding:40px">Không tìm thấy kết quả nào</p>';
  html += '</div>';
  resultsEl.innerHTML = html;
}, 400);

async function loadSuggestedUsers() {
  const res = await API.get('/feed/suggested-users');
  if (!res?.success) return;
  document.getElementById('suggestedUsers').innerHTML = `<div class="suggested-section">
    <div class="suggested-title">Gợi ý theo dõi</div>
    ${res.users.map(u => `
      <div class="suggested-user">
        <a href="profile.html?u=${u.username}"><img src="${avatarURL(u)}" class="avatar avatar-sm" alt=""></a>
        <div class="suggested-user-info">
          <a href="profile.html?u=${u.username}" class="suggested-user-name">${u.displayName || u.username}</a>
          <div class="suggested-user-meta">${formatNum(u.followersCount)} người theo dõi</div>
        </div>
      </div>`).join('')}
  </div>`;
}
</script>
</body>
</html>
