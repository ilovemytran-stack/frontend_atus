// Shim window.storage (API lưu trữ vốn chỉ có trong artifact Claude) bằng localStorage
// để component chạy được như một trang HTML/JS thuần, không cần backend riêng cho phần này.
if (!window.storage) {
  const ns = (shared) => (shared ? 'shared:' : 'personal:');
  window.storage = {
    async get(key, shared = false) {
      const raw = localStorage.getItem(ns(shared) + key);
      if (raw === null) throw new Error('Key not found: ' + key);
      return { key, value: raw, shared };
    },
    async set(key, value, shared = false) {
      localStorage.setItem(ns(shared) + key, value);
      return { key, value, shared };
    },
    async delete(key, shared = false) {
      localStorage.removeItem(ns(shared) + key);
      return { key, deleted: true, shared };
    },
    async list(prefix = '', shared = false) {
      const p = ns(shared) + prefix;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(p)) keys.push(k.slice(ns(shared).length));
      }
      return { keys, prefix, shared };
    },
  };
}
</script>

function compressImage(file, maxDim = 640, quality = 0.65) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new window.Image();
            img.onload = () => {
                let { width, height } = img;
                if (width >= height && width > maxDim) {
                    height = Math.round((height * maxDim) / width);
                    width = maxDim;
                }
                else if (height > width && height > maxDim) {
                    width = Math.round((width * maxDim) / height);
                    height = maxDim;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = () => reject(new Error('Không thể đọc ảnh'));
            img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Không thể đọc file'));
        reader.readAsDataURL(file);
    });
}
