<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập – SocialShop</title>
<link rel="stylesheet" href="/css/global.css">
<link rel="manifest" href="/manifest.json">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 16px; background: var(--bg-base); }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(124,92,252,0.15) 0%, transparent 70%); pointer-events: none; }
.auth-box { width: 100%; max-width: 400px; animation: fadeIn 0.4s ease; position: relative; }
.brand { text-align: center; margin-bottom: 32px; }
.brand-logo { width: 56px; height: 56px; background: linear-gradient(135deg, var(--brand), var(--accent-pink)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; box-shadow: var(--shadow-brand); }
.brand-name { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--brand)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.brand-sub { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
.auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px 24px; }
.auth-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; text-align: center; }
.auth-form { display: flex; flex-direction: column; gap: 16px; }
.forgot-link { text-align: right; font-size: 0.82rem; color: var(--text-link); margin-top: -8px; }
.auth-submit { width: 100%; padding: 13px; font-size: 1rem; }
.auth-footer { text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 0.88rem; }
.auth-footer a { color: var(--text-link); font-weight: 600; }
.social-login { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.btn-social { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); }
.btn-social:hover { background: var(--bg-hover); }
</style>
</head>
<body>
<div class="auth-box">
  <div class="brand">
    <div class="brand-logo">🌐</div>
    <div class="brand-name">SocialShop</div>
    <div class="brand-sub">Kết nối, chia sẻ, mua sắm</div>
  </div>
  <div class="auth-card">
    <div class="auth-title">Chào mừng trở lại 👋</div>
    <div class="auth-form">
      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input class="input has-icon" type="email" id="email" placeholder="email@example.com" autocomplete="email">
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="input has-icon" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button class="input-toggle" onclick="togglePwd()">👁</button>
        </div>
      </div>
      <a href="forgot-password.html" class="forgot-link">Quên mật khẩu?</a>
      <button class="btn btn-primary auth-submit" id="loginBtn" onclick="login()">Đăng nhập</button>
      <div class="divider-text">hoặc</div>
    </div>
    <div class="auth-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></div>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
if (API.isLoggedIn()) window.location.href = 'index.html';

const emailEl = document.getElementById('email');
const pwdEl = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');

function togglePwd() { pwdEl.type = pwdEl.type === 'password' ? 'text' : 'password'; }

[emailEl, pwdEl].forEach(el => el.addEventListener('keydown', e => e.key === 'Enter' && login()));

async function login() {
  const email = emailEl.value.trim();
  const password = pwdEl.value;
  if (!email || !password) return Toast.error('Vui lòng nhập đầy đủ thông tin');

  loadingBtn(loginBtn, true);
  const res = await API.post('/auth/login', { email, password });
  loadingBtn(loginBtn, false);

  if (res?.success) {
    API.setToken(res.token);
    localStorage.setItem('ss_refresh', res.refreshToken);
    API.saveUser(res.user);
    Toast.success('Đăng nhập thành công!');
    setTimeout(() => window.location.href = 'index.html', 500);
  } else {
    Toast.error(res?.message || 'Đăng nhập thất bại');
    emailEl.classList.add('input-error');
    pwdEl.classList.add('input-error');
  }
}
</script>
</body>
</html>
