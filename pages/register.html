<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký – Public</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Public">
<meta name="theme-color" content="#0B0D10">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="/css/global.css">
<link rel="stylesheet" href="/css/liquid-glass.css">
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 16px; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(124,92,252,0.12) 0%, transparent 70%); pointer-events: none; }
.auth-box { width: 100%; max-width: 420px; animation: fadeIn 0.4s ease; }
.brand { text-align: center; margin-bottom: 24px; }
.brand-logo { width: 52px; height: 52px; background: linear-gradient(135deg, var(--brand), var(--accent-pink)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 10px; }
.brand-name { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #fff, var(--brand)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
.auth-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; text-align: center; }
.form { display: flex; flex-direction: column; gap: 14px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.auth-submit { width: 100%; padding: 13px; font-size: 1rem; }
.terms { font-size: 0.78rem; color: var(--text-muted); text-align: center; }
.terms a { color: var(--text-link); }
.auth-footer { text-align: center; margin-top: 18px; color: var(--text-secondary); font-size: 0.88rem; }
.auth-footer a { color: var(--text-link); font-weight: 600; }
.strength-bar { height: 4px; border-radius: 2px; background: var(--bg-elevated); margin-top: 6px; overflow: hidden; }
.strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
</style>
</head>
<body>
<div class="auth-box">
  <div class="brand">
    <div class="brand-logo">🌐</div>
    <div class="brand-name">Public</div>
  </div>
  <div class="auth-card">
    <div class="auth-title">Tạo tài khoản mới ✨</div>
    <div class="form">
      <div class="row-2">
        <div class="input-group">
          <label class="input-label">Tên hiển thị</label>
          <input class="input" id="displayName" placeholder="Nguyễn Văn A" type="text">
        </div>
        <div class="input-group">
          <label class="input-label">Username</label>
          <input class="input" id="username" placeholder="nguyenvana" type="text" autocapitalize="none">
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input class="input has-icon" id="email" placeholder="email@example.com" type="email">
        </div>
      </div>
      <div class="input-group">
        <label class="input-label">Mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="input has-icon" id="password" placeholder="Ít nhất 6 ký tự" type="password" oninput="checkStrength(this.value)">
          <button class="input-toggle" onclick="togglePwd('password')">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="input-group">
        <label class="input-label">Xác nhận mật khẩu</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input class="input has-icon" id="confirmPassword" placeholder="Nhập lại mật khẩu" type="password">
          <button class="input-toggle" onclick="togglePwd('confirmPassword')">👁</button>
        </div>
      </div>
      <p class="terms">Bằng cách đăng ký, bạn đồng ý với <a href="#">Điều khoản</a> và <a href="#">Chính sách bảo mật</a></p>
      <button class="btn btn-primary auth-submit" id="registerBtn" onclick="register()">Tạo tài khoản</button>
    </div>
  </div>
  <div class="auth-footer">Đã có tài khoản? <a href="login.html">Đăng nhập</a></div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
if (API.isLoggedIn()) window.location.href = 'feed.html';

function togglePwd(id) { const el = document.getElementById(id); el.type = el.type === 'password' ? 'text' : 'password'; }

function checkStrength(pwd) {
  const fill = document.getElementById('strengthFill');
  let score = 0;
  if (pwd.length >= 6) score++;
  if (pwd.length >= 10) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  const pct = (score / 5) * 100;
  const colors = ['#FC5C5C','#FCAC5C','#FCDC5C','#5CFC9A','#5CF0FC'];
  fill.style.width = pct + '%';
  fill.style.background = colors[score - 1] || 'transparent';
}

async function register() {
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const displayName = document.getElementById('displayName').value.trim();
  const btn = document.getElementById('registerBtn');

  if (!username || !email || !password) return Toast.error('Vui lòng điền đầy đủ thông tin');
  if (password !== confirmPassword) return Toast.error('Mật khẩu không khớp');
  if (password.length < 6) return Toast.error('Mật khẩu phải có ít nhất 6 ký tự');
  if (!/^[a-zA-Z0-9_]+$/.test(username)) return Toast.error('Username chỉ được dùng chữ, số, gạch dưới');

  loadingBtn(btn, true);
  const res = await API.post('/auth/register', { username, email, password, displayName });
  loadingBtn(btn, false);

  if (res?.success) {
    API.setToken(res.token);
    localStorage.setItem('ss_refresh', res.refreshToken);
    API.saveUser(res.user);
    Toast.success('Đăng ký thành công! Chào mừng 🎉');
    setTimeout(() => window.location.href = 'feed.html', 800);
  } else {
    Toast.error(res?.message || 'Đăng ký thất bại');
  }
}
</script>
</body>
</html>
