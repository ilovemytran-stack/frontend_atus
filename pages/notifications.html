<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo – SocialShop</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/feed.css">
<style>
.notif-page { max-width: 600px; margin: 0 auto; }
.notif-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
.notif-header h2 { font-size: 1.3rem; font-weight: 800; }
.notif-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; transition: var(--transition); position: relative; }
.notif-item:hover { background: var(--bg-elevated); }
.notif-item.unread { background: rgba(124,92,252,0.06); }
.notif-item.unread::before { content: ''; position: absolute; left: 6px; top: 50%; transform: translateY(-50%); width: 7px; height: 7px; background: var(--brand); border-radius: 50%; }
.notif-icon { font-size: 18px; }
.notif-text { flex: 1; font-size: 0.9rem; line-height: 1.4; }
.notif-text strong { font-weight: 700; }
.notif-time { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
.notif-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); object-fit: cover; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <header class="mobile-header">
      <button class="btn btn-ghost btn-icon" id="menu-btn">☰</button>
      <div class="mobile-header-logo">Thông báo</div>
      <div style="width:40px"></div>
    </header>

    <div class="notif-page">
      <div class="notif-header">
        <h2>Thông báo</h2>
        <button class="btn btn-ghost btn-sm" onclick="markAllRead()">Đánh dấu đã đọc</button>
      </div>
      <div id="notifList"></div>
      <div id="notifEmpty" style="display:none;text-align:center;padding:60px 20px;color:var(--text-muted)">
        <div style="font-size:48px;margin-bottom:12px">🔔</div>
        <p>Chưa có thông báo nào</p>
      </div>
    </div>
  </main>
</div>
<nav class="bottom-nav" id="bottom-nav"></nav>
<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script>
if (!API.requireAuth()) {}

document.addEventListener('DOMContentLoaded', () => { Layout.init(); loadNotifications(); });

const ICONS = { like: '❤️', comment: '💬', follow: '👤', share: '🔗', video_like: '❤️', video_comment: '💬' };
const TEXTS = {
  like: 'đã thích bài viết của bạn',
  comment: 'đã bình luận về bài viết của bạn',
  follow: 'đã bắt đầu theo dõi bạn',
  share: 'đã chia sẻ bài viết của bạn',
  video_like: 'đã thích video của bạn',
  video_comment: 'đã bình luận về video của bạn',
};

async function loadNotifications() {
  const res = await API.get('/notifications');
  const container = document.getElementById('notifList');
  if (!res?.success || !res.notifications.length) {
    document.getElementById('notifEmpty').style.display = 'block';
    return;
  }
  container.innerHTML = res.notifications.map(n => `
    <a href="${linkFor(n)}" class="notif-item ${!n.isRead ? 'unread' : ''}">
      <img src="${avatarURL(n.sender)}" class="avatar avatar-md" alt="">
      <div class="notif-text">
        <strong>${n.sender?.displayName || n.sender?.username}</strong> ${TEXTS[n.type] || ''}
        <div class="notif-time">${timeAgo(n.createdAt)}</div>
      </div>
      <span class="notif-icon">${ICONS[n.type] || '🔔'}</span>
      ${n.post?.images?.[0]?.url ? `<img src="${n.post.images[0].url}" class="notif-thumb" alt="">` : ''}
      ${n.video?.thumbnail ? `<img src="${n.video.thumbnail}" class="notif-thumb" alt="">` : ''}
    </a>`).join('');
}

function linkFor(n) {
  if (n.type === 'follow') return `profile.html?u=${n.sender?.username}`;
  if (n.video) return 'videos.html';
  if (n.post) return `post.html?id=${n.post._id}`;
  return '#';
}

async function markAllRead() {
  await API.put('/notifications/read-all');
  document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
  Toast.success('Đã đánh dấu tất cả là đã đọc');
}
</script>
</body>
</html>
