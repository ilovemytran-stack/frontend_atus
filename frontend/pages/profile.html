<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang cá nhân – SocialShop</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/feed.css">
<link rel="stylesheet" href="css/profile.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <header class="mobile-header">
      <button class="btn btn-ghost btn-icon" id="menu-btn">☰</button>
      <div class="mobile-header-logo" id="mobileTitle">Trang cá nhân</div>
      <div style="width:40px"></div>
    </header>

    <div class="profile-cover" id="profileCover">
      <div class="skeleton" style="width:100%;height:100%"></div>
    </div>

    <div class="profile-header">
      <img class="avatar avatar-2xl profile-avatar" id="profileAvatar" src="" alt="">
      <div class="profile-actions" id="profileActions"></div>
    </div>

    <div class="profile-info">
      <div class="profile-name" id="profileName">
        <span id="profileDisplayName"></span>
        <span id="profileVerified"></span>
      </div>
      <div class="profile-username" id="profileUsername"></div>
      <div class="profile-bio" id="profileBio"></div>
      <div class="profile-meta" id="profileMeta"></div>
      <div class="profile-stats">
        <a href="#" class="profile-stat" id="statPosts"><strong>0</strong><span>Bài viết</span></a>
        <button class="profile-stat" onclick="openFollowList('followers')"><strong id="statFollowersNum">0</strong><span>Người theo dõi</span></button>
        <button class="profile-stat" onclick="openFollowList('following')"><strong id="statFollowingNum">0</strong><span>Đang theo dõi</span></button>
      </div>
    </div>

    <div class="profile-tabs">
      <button class="feed-tab active" data-tab="posts" onclick="switchProfileTab('posts')">📝 Bài viết</button>
      <button class="feed-tab" data-tab="videos" onclick="switchProfileTab('videos')">🎬 Video</button>
    </div>

    <div id="profilePosts" class="feed"></div>
    <div id="profileVideos" class="video-grid" style="display:none"></div>
    <div id="profileEmpty" style="display:none;text-align:center;padding:48px;color:var(--text-muted)">
      <div style="font-size:40px;margin-bottom:12px">📭</div>
      <p>Chưa có nội dung nào</p>
    </div>
  </main>

  <aside class="right-sidebar">
    <div id="suggestedUsers"></div>
  </aside>
</div>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Chỉnh sửa trang cá nhân</div>
      <button class="modal-close btn btn-ghost btn-icon" onclick="closeEditModal()">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="input-group">
        <label class="input-label">Tên hiển thị</label>
        <input class="input" id="editDisplayName">
      </div>
      <div class="input-group">
        <label class="input-label">Tiểu sử</label>
        <textarea class="input" id="editBio" rows="3" style="resize:vertical" maxlength="300"></textarea>
      </div>
      <div class="input-group">
        <label class="input-label">Website</label>
        <input class="input" id="editWebsite" placeholder="https://...">
      </div>
      <div class="input-group">
        <label class="input-label">Địa điểm</label>
        <input class="input" id="editLocation" placeholder="Hà Nội, Việt Nam">
      </div>
      <button class="btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">Lưu thay đổi</button>
    </div>
  </div>
</div>

<!-- Followers/Following Modal -->
<div class="modal-overlay" id="followModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="followModalTitle">Người theo dõi</div>
      <button class="modal-close btn btn-ghost btn-icon" onclick="closeFollowModal()">✕</button>
    </div>
    <div id="followList" style="max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:4px"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>

<script src="js/api.js"></script>
<script src="js/layout.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
